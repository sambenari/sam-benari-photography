<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project — Sam Benari</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="project-page">

  <!-- NAVIGATION -->
  <nav id="nav">
    <a href="index.html" class="nav-logo">Sam Benari</a>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
      <span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Work</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="store.html">Store</a></li>
    </ul>
  </nav>

  <!-- PROJECT HEADER -->
  <header class="project-header">
    <a href="index.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      All Projects
    </a>
    <div class="project-title-section">
      <div class="project-title-block">
        <h1 class="project-title" id="projectTitle">Loading...</h1>
        <p class="project-count" id="photoCount"></p>
      </div>
      <button class="project-slideshow-btn" id="projectSlideshowBtn" aria-label="Start slideshow">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M5 3L20 12L5 21V3Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="currentColor"/>
        </svg>
        Slideshow
      </button>
    </div>
  </header>

  <!-- PHOTO STRIP / THUMBNAILS -->
  <section class="photo-strip-section">
    <div class="photo-strip" id="photoStrip">
      <!-- Populated by JS -->
    </div>
  </section>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lightbox-overlay" id="lightboxOverlay"></div>
    <button class="lightbox-close" id="lightboxClose" aria-label="Close">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="lightbox-slideshow" id="lightboxSlideshow" aria-label="Start slideshow">
      <span class="slideshow-text">Slideshow</span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="play-icon">
        <path d="M5 3L20 12L5 21V3Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="currentColor"/>
      </svg>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="pause-icon" style="display:none;">
        <rect x="6" y="4" width="4" height="16" stroke="currentColor" stroke-width="1.5" fill="currentColor"/>
        <rect x="14" y="4" width="4" height="16" stroke="currentColor" stroke-width="1.5" fill="currentColor"/>
      </svg>
    </button>
    <button class="lightbox-prev" id="lightboxPrev" aria-label="Previous">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 4L7 12L15 20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="lightbox-next" id="lightboxNext" aria-label="Next">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M9 4L17 12L9 20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="lightbox-content">
      <img class="lightbox-img" id="lightboxImg" src="" alt="" />
      <div class="lightbox-counter" id="lightboxCounter"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-name">Sam Benari</span>
      <div class="footer-links">
        <a href="https://instagram.com/" target="_blank" rel="noopener">Instagram</a>
        <a href="https://flickr.com/" target="_blank" rel="noopener">Flickr</a>
        <a href="mailto:sam.benari@me.com">Contact</a>
      </div>
      <span class="footer-copy">&copy; <span id="year"></span></span>
    </div>
  </footer>

  <script src="js/projects.js"></script>
  <script src="js/project-detail.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
